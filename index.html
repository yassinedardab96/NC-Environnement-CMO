<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plateforme NC Environnement — CMO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;color:#2C2C2A;background:#F1EFE8}
.wrap{max-width:960px;margin:0 auto;padding:1.2rem}
.hdr{background:#0F6E56;border-radius:10px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.hdr-t{color:#fff;font-size:15px;font-weight:700}
.hdr-s{color:#9FE1CB;font-size:11px;margin-top:3px}
.hdr-b{background:#085041;color:#9FE1CB;font-size:11px;padding:5px 12px;border-radius:20px}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:99px;border:1px solid #B4B2A9;font-size:13px;cursor:pointer;background:#fff;color:#5F5E5A;transition:all .15s}
.tab:hover{border-color:#0F6E56;color:#0F6E56}
.tab.on{background:#0F6E56;color:#fff;border-color:#0F6E56;font-weight:600}

.card{background:#fff;border:1px solid #D3D1C7;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:7px 12px;border-radius:6px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.sg{background:#E1F5EE;color:#085041}
.sb{background:#E6F1FB;color:#0C447C}
.sa{background:#FAEEDA;color:#633806}
.sr{background:#FCEBEB;color:#791F1F}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.full{grid-column:1/-1}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:11px;color:#5F5E5A;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.fld input,.fld select,.fld textarea{font-size:13px;padding:8px 10px;border-radius:6px;border:1px solid #D3D1C7;background:#F8F8F6;color:#2C2C2A;width:100%;font-family:Arial,sans-serif;transition:border-color .15s}
.fld textarea{resize:vertical;min-height:70px}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:#0F6E56;background:#fff}
.zone-hint{font-size:11px;color:#888;margin-top:3px;font-style:italic}
.tbtn{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #D3D1C7;background:#F8F8F6;color:#5F5E5A;transition:all .15s;user-select:none;display:inline-block}
.tbtn:hover{border-color:#0F6E56;color:#085041}
.tbtn.on{background:#E1F5EE;color:#085041;border-color:#1D9E75;font-weight:600}
.tgrp{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.picker{border:1px solid #D3D1C7;border-radius:8px;overflow:hidden;margin-top:4px}
.picker-search{width:100%;padding:8px 10px;border:none;border-bottom:1px solid #D3D1C7;font-size:13px;background:#fff;outline:none;font-family:Arial,sans-serif}
.picker-search::placeholder{color:#B4B2A9}
.picker-tags{display:flex;flex-wrap:wrap;gap:5px;padding:8px 10px;background:#F8F8F6;border-bottom:1px solid #E8E6DF;min-height:38px;align-items:center}
.picker-tag{display:inline-flex;align-items:center;gap:4px;background:#E1F5EE;color:#085041;border:1px solid #1D9E75;border-radius:99px;font-size:11px;font-weight:600;padding:2px 8px}
.picker-tag .rm{cursor:pointer;font-size:14px;line-height:1;margin-left:2px;color:#1D9E75}
.picker-tag .rm:hover{color:#A32D2D}
.picker-empty{font-size:11px;color:#B4B2A9;font-style:italic}
.picker-list{max-height:180px;overflow-y:auto;padding:6px;background:#fff}
.picker-item{padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:#2C2C2A;transition:background .1s}
.picker-item:hover{background:#E1F5EE;color:#085041}
.picker-item.on{background:#E1F5EE;color:#085041;font-weight:600}
.picker-item.hidden{display:none}
.picker-count{font-size:11px;color:#888;margin-top:3px;font-style:italic}
.cdd{position:relative;width:100%}
.cdd-btn{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid #D3D1C7;border-radius:6px;background:#F8F8F6;cursor:pointer;font-size:13px;color:#2C2C2A;user-select:none}
.cdd-btn:hover{border-color:#0F6E56}
.cdd-arrow{font-size:10px;color:#888;transition:transform .2s}
.cdd.open .cdd-arrow{transform:rotate(180deg)}
.cdd-drop{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #D3D1C7;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:999;overflow:hidden}
.cdd.open .cdd-drop{display:block}
.cdd-search{width:100%;padding:9px 12px;border:none;border-bottom:1px solid #E8E6DF;font-size:13px;font-family:Arial,sans-serif;outline:none;background:#F8F8F6}
.cdd-list{max-height:220px;overflow-y:auto}
.cdd-item{padding:8px 14px;font-size:13px;cursor:pointer;color:#2C2C2A;border-bottom:0.5px solid #F1EFE8}
.cdd-item:hover{background:#E1F5EE;color:#085041}
.cdd-item.on{background:#E1F5EE;color:#085041;font-weight:600}
.cdd-item.hidden{display:none}
.gbtn{padding:5px 16px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;user-select:none}
.gf{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.gm{background:#FAEEDA;color:#854F0B;border-color:#FAC775}
.gc{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.gbtn.sel{outline:3px solid currentColor;outline-offset:1px}
.savebtn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:#0F6E56;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .15s}
.savebtn:hover{opacity:.88}
.cancelbtn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:#fff;color:#2C2C2A;border:1px solid #D3D1C7;border-radius:8px;font-size:13px;cursor:pointer;margin-top:6px}
.metric{background:#F8F8F6;border-radius:8px;padding:14px;text-align:center;border:1px solid #E8E6DF}
.metric-n{font-size:28px;font-weight:700;line-height:1}
.metric-l{font-size:11px;color:#5F5E5A;margin-top:4px}
.pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600}
.p-o{background:#FAEEDA;color:#854F0B}
.p-ec{background:#E6F1FB;color:#185FA5}
.p-c{background:#EAF3DE;color:#3B6D11}
.p-an{background:#F1EFE8;color:#5F5E5A}
.p-f{background:#EAF3DE;color:#3B6D11}
.p-m{background:#FAEEDA;color:#854F0B}
.p-cr{background:#FCEBEB;color:#A32D2D}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tbl th{background:#0F6E56;color:#fff;padding:9px 10px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.3px}
.tbl td{padding:8px 10px;border-bottom:1px solid #E8E6DF;vertical-align:top;font-size:12px;white-space:normal;word-break:break-word;min-width:80px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#F8F8F6}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.on{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.5rem;max-width:660px;width:100%;max-height:88vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:12px;border-bottom:1px solid #D3D1C7}
.modal-hdr h2{font-size:15px;color:#085041;font-weight:700}
.xbtn{background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1}
.rb{background:#F8F8F6;border-radius:8px;padding:9px 12px;margin-bottom:7px;border-left:3px solid #1D9E75}
.rb.blue{border-left-color:#378ADD}
.rb.amber{border-left-color:#EF9F27}
.rb-l{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.rb-v{font-size:13px;color:#2C2C2A}
.ref-tag{display:inline-block;background:#E1F5EE;color:#085041;border:1px solid #1D9E75;border-radius:6px;padding:3px 12px;font-size:12px;font-weight:700;margin-bottom:12px}
.hr{border:none;border-top:1px solid #D3D1C7;margin:12px 0}
.prog-bar{height:8px;background:#E8E6DF;border-radius:99px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:99px;background:#1D9E75}
.alert-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:#FCEBEB;border:1px solid #F7C1C1;margin-bottom:7px;font-size:12px;color:#791F1F}
.flt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.flt select{font-size:12px;padding:6px 9px;border-radius:6px;border:1px solid #D3D1C7;background:#F8F8F6;color:#2C2C2A}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}.full{grid-column:1}.hdr{flex-direction:column;gap:8px}}
</style>
</head>
